interval:
  - interval: 250ms
    then:
      - if:
          condition:
            lambda: |-
              return id(media_screen_visible) && id(media_volume_overlay_until_ms) != 0 && millis() > id(media_volume_overlay_until_ms);
          then:
            - lambda: |-
                id(media_volume_overlay_until_ms) = 0;
            - lvgl.widget.hide: media_volume_arc

  - interval: 1s
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) {
            now = id(rtctime).now();
          }
          if (!now.is_valid()) {
            return;
          }

          const int minute_key = now.day_of_year * 1440 + now.hour * 60 + now.minute;
          if (id(last_ui_minute_key) != minute_key) {
            id(last_ui_minute_key) = minute_key;
            id(sync_alarm_day_state).execute();
            id(update_minutes_hand).execute();
          }

          if (id(last_alarm_debug_minute_key) != minute_key) {
            id(last_alarm_debug_minute_key) = minute_key;
            if (id(next_alarm_available)) {
              auto next_alarm = ESPTime::from_epoch_local(id(next_alarm_epoch));
              ESP_LOGI(
                "alarm",
                "Alarm check now=%02d:%02d:%02d target=%02d:%02d enabled=%d skip_next=%d ringing=%d snooze_active=%d override=%d",
                now.hour,
                now.minute,
                now.second,
                next_alarm.hour,
                next_alarm.minute,
                id(alarm_enabled),
                id(skip_next_ring),
                id(alarm_ringing),
                id(snooze_active),
                id(next_ring_override_active)
              );
            }
          }
      - if:
          condition:
            lambda: |-
              auto now = id(sntp_time).now();
              if (!now.is_valid()) {
                now = id(rtctime).now();
              }
              if (!now.is_valid()) {
                return false;
              }
              if (!id(alarm_enabled) || id(alarm_ringing)) {
                return false;
              }
              if (!id(next_alarm_available)) {
                return false;
              }
              const uint32_t now_minute = uint32_t(now.timestamp / 60);
              const uint32_t target_minute = uint32_t(id(next_alarm_epoch) / 60);
              if (now_minute != target_minute) {
                return false;
              }
              if (id(last_alarm_minute_key) == int(target_minute)) {
                return false;
              }
              id(last_alarm_minute_key) = int(target_minute);
              ESP_LOGI("alarm", "Alarm trigger matched at %02d:%02d:%02d", now.hour, now.minute, now.second);
              return true;
          then:
            - script.execute: start_alarm
      - if:
          condition:
            lambda: |-
              if (id(alarm_ringing)) {
                return false;
              }
              if (id(screen_dimmed)) {
                return false;
              }
              return millis() - id(last_interaction_ms) >= 60000;
          then:
            - lambda: |-
                id(screen_dimmed) = true;
                ESP_LOGD("ui", "Screen dimmed after inactivity");
            - script.execute: apply_idle_brightness

  - interval: 400ms
    then:
      - if:
          condition:
            lambda: "return id(alarm_ringing);"
          then:
            - lambda: |-
                id(alarm_flash_on) = !id(alarm_flash_on);
            - script.execute: update_alarm_status_ui
          else:
            - if:
                condition:
                  lambda: |-
                    return id(morning_music_prompt_until_ms) != 0 && id(morning_briefing_auto_start_ms) != 0 &&
                           millis() >= id(morning_briefing_auto_start_ms);
                then:
                  - lambda: |-
                      id(morning_music_prompt_until_ms) = 0;
                      id(morning_briefing_auto_start_ms) = 0;
                  - script.execute: play_morning_briefing_on_ha
                  - script.execute: update_alarm_status_ui
                else:
                  - if:
                      condition:
                        lambda: |-
                          return id(alarm_flash_on) || id(dismiss_feedback_until_ms) != 0 ||
                                 id(morning_music_prompt_until_ms) != 0 || id(morning_briefing_auto_start_ms) != 0;
                      then:
                        - lambda: |-
                            if (id(alarm_flash_on)) {
                              id(alarm_flash_on) = false;
                            }
                            if (id(dismiss_feedback_until_ms) != 0 && millis() >= id(dismiss_feedback_until_ms)) {
                              id(dismiss_feedback_until_ms) = 0;
                            }
                            if (id(morning_music_prompt_until_ms) != 0 && millis() >= id(morning_music_prompt_until_ms)) {
                              id(morning_music_prompt_until_ms) = 0;
                              id(morning_briefing_auto_start_ms) = 0;
                            }
                        - script.execute: update_alarm_status_ui

script:
  - id: sync_next_alarm_state
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) {
            now = id(rtctime).now();
          }
          if (!now.is_valid() || !id(alarm_enabled)) {
            id(next_alarm_available) = false;
            id(next_alarm_epoch) = 0;
            return;
          }

          const uint32_t now_minute = uint32_t(now.timestamp / 60);
          if (id(skip_next_ring)) {
            const uint32_t skipped_minute = uint32_t(id(skip_next_ring_epoch) / 60);
            if (id(skip_next_ring_epoch) == 0 || skipped_minute < now_minute) {
              id(skip_next_ring) = false;
              id(skip_next_ring_epoch) = 0;
            }
          }

          if (id(next_ring_override_active)) {
            const uint32_t override_minute = uint32_t(id(next_ring_override_epoch) / 60);
            if (override_minute >= now_minute) {
              if (id(skip_next_ring) && id(skip_next_ring_epoch) != 0 &&
                  override_minute == uint32_t(id(skip_next_ring_epoch) / 60)) {
                // Skip this one-time override and fall through to the next scheduled alarm.
              } else {
                id(next_alarm_available) = true;
                id(next_alarm_epoch) = id(next_ring_override_epoch);
                return;
              }
            }
            id(next_ring_override_active) = false;
            id(next_ring_override_epoch) = 0;
          }

          if (id(snooze_active)) {
            int day_offset = (id(snooze_day_of_year) == now.day_of_year) ? 0 : 1;
            const time_t midnight_epoch = now.timestamp - (now.hour * 3600) - (now.minute * 60) - now.second;
            const uint32_t snooze_epoch = uint32_t(midnight_epoch + (day_offset * 86400) + (id(snooze_hour) * 3600) + (id(snooze_minute) * 60));
            if (!(id(skip_next_ring) && id(skip_next_ring_epoch) != 0 &&
                  uint32_t(snooze_epoch / 60) == uint32_t(id(skip_next_ring_epoch) / 60))) {
              id(next_alarm_epoch) = snooze_epoch;
              id(next_alarm_available) = true;
              return;
            }
          }

          const auto weekday_alarm = id(weekday_alarm_time);
          const auto weekend_alarm = id(weekend_alarm_time);
          if (weekday_alarm == nullptr || weekend_alarm == nullptr) {
            id(next_alarm_available) = false;
            id(next_alarm_epoch) = 0;
            return;
          }

          bool found = false;
          for (int offset = 0; offset < 8; offset++) {
            const int candidate_dow = ((now.day_of_week - 1 + offset) % 7) + 1;
            auto candidate_alarm = (candidate_dow == 1 || candidate_dow == 7) ? weekend_alarm : weekday_alarm;
            const int now_total_minutes = now.hour * 60 + now.minute;
            const int candidate_total_minutes = candidate_alarm->hour * 60 + candidate_alarm->minute;
            const bool valid_time = offset > 0 ||
                                    candidate_total_minutes >= now_total_minutes;
            if (!valid_time) {
              continue;
            }
            const time_t midnight_epoch = now.timestamp - (now.hour * 3600) - (now.minute * 60) - now.second;
            const uint32_t candidate_epoch = uint32_t(midnight_epoch + (offset * 86400) + (candidate_alarm->hour * 3600) + (candidate_alarm->minute * 60));
            if (id(skip_next_ring) && id(skip_next_ring_epoch) != 0 &&
                uint32_t(candidate_epoch / 60) == uint32_t(id(skip_next_ring_epoch) / 60)) {
              continue;
            }
            id(next_alarm_epoch) = candidate_epoch;
            id(next_alarm_available) = true;
            found = true;
            break;
          }

          if (!found) {
            id(next_alarm_available) = false;
            id(next_alarm_epoch) = 0;
          }

  - id: clear_snooze
    then:
      - lambda: |-
          id(snooze_active) = false;
          id(snooze_day_of_year) = -1;
          id(snooze_hour) = -1;
          id(snooze_minute) = -1;

  - id: enable_alarm
    then:
      - lambda: |-
          if (!id(alarm_enabled)) {
            ESP_LOGI("alarm", "Away mode disabled; alarm enabled");
          }
          id(alarm_enabled) = true;
          id(alarm_enabled_switch).publish_state(true);
      - script.execute: update_minutes_hand
      - script.execute: reset_idle_timer

  - id: dismiss_alarm
    then:
      - lambda: |-
          const uint32_t now_ms = millis();
          id(dismiss_feedback_until_ms) = now_ms + 3000;
          id(morning_music_prompt_until_ms) = now_ms + 60000;
          id(morning_briefing_auto_start_ms) = now_ms + 15000;
      - script.execute: clear_snooze
      - script.execute: stop_alarm

  - id: sync_alarm_day_state
    then:
      - script.execute: sync_next_alarm_state
      - script.execute: update_alarm_status_ui

  - id: toggle_skip_next_ring
    then:
      - script.execute: sync_next_alarm_state
      - lambda: |-
          if (id(skip_next_ring)) {
            id(skip_next_ring) = false;
            id(skip_next_ring_epoch) = 0;
            ESP_LOGI("ui", "Skip next ring cleared");
            return;
          }
          if (!id(next_alarm_available)) {
            ESP_LOGW("ui", "Skip next ring requested but there is no next alarm available");
            return;
          }
          id(skip_next_ring) = true;
          id(skip_next_ring_epoch) = id(next_alarm_epoch);
          auto skipped_alarm = ESPTime::from_epoch_local(id(skip_next_ring_epoch));
          ESP_LOGI("ui", "Skip next ring set for %02d:%02d", skipped_alarm.hour, skipped_alarm.minute);
      - script.execute: update_alarm_status_ui

  - id: open_home_menu
    then:
      - lambda: |-
          id(home_menu_visible) = true;
          ESP_LOGI("ui", "Home menu opened");
      - script.execute: update_alarm_status_ui
      - script.execute: reset_idle_timer
      - script.execute: auto_close_home_menu

  - id: close_home_menu
    then:
      - lambda: |-
          id(home_menu_visible) = false;
          ESP_LOGI("ui", "Home menu closed");
      - script.stop: auto_close_home_menu
      - script.execute: update_alarm_status_ui
      - script.execute: reset_idle_timer

  - id: auto_close_home_menu
    mode: restart
    then:
      - delay: 10s
      - if:
          condition:
            lambda: "return id(home_menu_visible) && !id(alarm_ringing);"
          then:
            - lambda: |-
                id(home_menu_visible) = false;
                ESP_LOGI("ui", "Home menu auto-closed");
            - script.execute: update_alarm_status_ui

  - id: home_all_lights_off
    then:
      - lambda: |-
          ESP_LOGI("ui", "Requesting Home Assistant action: all lights off");
      - homeassistant.action:
          action: ${home_lights_off_action}
          data:
            entity_id: ${home_lights_off_entity}
          on_success:
            - lambda: |-
                ESP_LOGI("ui", "Requested Home Assistant action: all lights off");
          on_error:
            - lambda: |-
                ESP_LOGW("ui", "All lights off action failed: %s", error.c_str());

  - id: apply_active_brightness
    then:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda |-
            if (id(alarm_ringing)) {
              return 1.0f;
            }
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (now.is_valid() && (now.hour >= 23 || now.hour < 7)) {
              return 0.30f;
            }
            return 1.0f;

  - id: apply_idle_brightness
    then:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda |-
            if (id(alarm_ringing)) {
              return 1.0f;
            }
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (now.is_valid() && (now.hour >= 23 || now.hour < 7)) {
              return 0.08f;
            }
            return 0.25f;

  - id: start_alarm_media_on_ha
    then:
      - lambda: |-
          ESP_LOGI("alarm", "Requesting Home Assistant alarm audio start");
      - homeassistant.action:
          action: ${alarm_audio_start_action}
          data:
            entity_id: ${alarm_audio_player_entity}
          on_success:
            - if:
                condition:
                  lambda: "return id(alarm_ringing);"
                then:
                  - lambda: |-
                      ESP_LOGI("alarm", "Requested Home Assistant alarm audio start");
                  - script.stop: alarm_loop
                  - output.turn_off: buzzer
                else:
                  - lambda: |-
                      ESP_LOGW("alarm", "Home Assistant alarm audio started after alarm stopped; stopping media now");
                  - script.execute: stop_alarm_media_on_ha
          on_error:
            - lambda: |-
                ESP_LOGW("alarm", "Home Assistant alarm audio start failed: %s", error.c_str());

  - id: stop_alarm_media_on_ha
    then:
      - lambda: |-
          ESP_LOGI("alarm", "Requesting Home Assistant alarm audio stop for %s", "${alarm_audio_player_entity}");
      - homeassistant.action:
          action: ${alarm_audio_stop_action}
          data:
            entity_id: ${alarm_audio_player_entity}
          on_success:
            - lambda: |-
                ESP_LOGI("alarm", "Requested Home Assistant alarm audio stop for %s", "${alarm_audio_player_entity}");
          on_error:
            - lambda: |-
                ESP_LOGW("alarm", "Home Assistant alarm audio stop failed: %s", error.c_str());

  - id: play_morning_briefing_on_ha
    then:
      - lambda: |-
          ESP_LOGI("alarm", "Requesting Home Assistant morning briefing on %s", "${morning_briefing_player_entity}");
      - homeassistant.action:
          action: ${morning_briefing_action}
          data:
            media_player_entity_id: ${morning_briefing_player_entity}
          on_success:
            - lambda: |-
                ESP_LOGI("alarm", "Requested Home Assistant morning briefing");
          on_error:
            - lambda: |-
                ESP_LOGW("alarm", "Home Assistant morning briefing failed: %s", error.c_str());

  - id: play_morning_briefing_with_music_on_ha
    then:
      - lambda: |-
          ESP_LOGI("alarm", "Requesting Home Assistant morning briefing with music on %s", "${morning_briefing_player_entity}");
      - homeassistant.action:
          action: ${morning_briefing_action}
          data:
            media_player_entity_id: ${morning_briefing_player_entity}
            play_music_after: "true"
          on_success:
            - lambda: |-
                ESP_LOGI("alarm", "Requested Home Assistant morning briefing with music");
          on_error:
            - lambda: |-
                ESP_LOGW("alarm", "Home Assistant morning briefing with music failed: %s", error.c_str());

  - id: play_morning_music_on_ha
    mode: restart
    then:
      - lambda: |-
          id(morning_music_start_pending) = true;
          ESP_LOGI("alarm", "Requesting Home Assistant morning music on %s", "${morning_briefing_player_entity}");
      - homeassistant.action:
          action: ${morning_briefing_action}
          data:
            media_player_entity_id: ${morning_briefing_player_entity}
            music_only: "true"
          on_success:
            - lambda: |-
                ESP_LOGI("alarm", "Requested Home Assistant morning music");
          on_error:
            - lambda: |-
                id(morning_music_start_pending) = false;
                ESP_LOGW("alarm", "Home Assistant morning music failed: %s", error.c_str());
      - homeassistant.action:
          action: media_player.media_play
          data:
            entity_id: ${morning_briefing_player_entity}
          on_error:
            - lambda: |-
                ESP_LOGW("alarm", "Immediate Home Assistant media_play after music start failed: %s", error.c_str());
      - delay: 2s
      - if:
          condition:
            lambda: "return id(morning_music_start_pending);"
          then:
            - homeassistant.action:
                action: media_player.media_play
                data:
                  entity_id: ${morning_briefing_player_entity}
                on_error:
                  - lambda: |-
                      ESP_LOGW("alarm", "Follow-up Home Assistant media_play after music start failed: %s", error.c_str());

  - id: stop_morning_music_on_ha
    then:
      - script.stop: play_morning_music_on_ha
      - lambda: |-
          id(morning_music_start_pending) = false;
          ESP_LOGI("alarm", "Requesting Home Assistant morning music stop for %s", "${morning_briefing_player_entity}");
      - homeassistant.action:
          action: script.turn_off
          data:
            entity_id: ${morning_briefing_action}
          on_error:
            - lambda: |-
                ESP_LOGW("alarm", "Home Assistant morning music script cancel failed: %s", error.c_str());
      - homeassistant.action:
          action: media_player.media_stop
          data:
            entity_id: ${morning_briefing_player_entity}
          on_success:
            - lambda: |-
                ESP_LOGI("alarm", "Requested Home Assistant morning music stop for %s", "${morning_briefing_player_entity}");
          on_error:
            - lambda: |-
                ESP_LOGW("alarm", "Home Assistant morning music stop failed: %s", error.c_str());

  - id: open_media_screen
    then:
      - lambda: |-
          id(media_screen_visible) = true;
          id(home_menu_visible) = false;
          ESP_LOGI("media", "Media screen opened");
      - script.stop: auto_close_home_menu
      - script.execute: update_media_screen_ui
      - script.execute: update_alarm_status_ui
      - script.execute: reset_idle_timer

  - id: close_media_screen
    then:
      - lambda: |-
          id(media_screen_visible) = false;
          ESP_LOGI("media", "Media screen closed");
      - script.execute: update_alarm_status_ui
      - script.execute: reset_idle_timer

  - id: media_play_pause_on_ha
    then:
      - lambda: |-
          ESP_LOGI("media", "Requesting media play/pause for %s", "${morning_briefing_player_entity}");
      - homeassistant.action:
          action: media_player.media_play_pause
          data:
            entity_id: ${morning_briefing_player_entity}
          on_error:
            - lambda: |-
                ESP_LOGW("media", "Media play/pause failed: %s", error.c_str());

  - id: media_next_track_on_ha
    then:
      - lambda: |-
          ESP_LOGI("media", "Requesting media next track for %s", "${morning_briefing_player_entity}");
      - homeassistant.action:
          action: media_player.media_next_track
          data:
            entity_id: ${morning_briefing_player_entity}
          on_error:
            - lambda: |-
                ESP_LOGW("media", "Media next track failed: %s", error.c_str());

  - id: set_morning_music_volume_on_ha
    mode: restart
    then:
      - homeassistant.action:
          action: media_player.volume_set
          data:
            entity_id: ${morning_briefing_player_entity}
            volume_level: !lambda |-
              return id(media_volume_level);
          on_error:
            - lambda: |-
                ESP_LOGW("media", "Media volume set failed: %s", error.c_str());

  - id: show_media_volume_overlay
    then:
      - lambda: |-
          id(media_volume_overlay_until_ms) = millis() + 1500;
      - lvgl.widget.show: media_volume_arc
      - script.execute: update_media_screen_ui

  - id: update_media_screen_ui
    then:
      - lvgl.arc.update:
          id: media_volume_arc
          value: !lambda |-
            return int(id(media_volume_level) * 100.0f + 0.5f);
      - lvgl.label.update:
          id: menu_music_play_label
          text: !lambda |-
            if (id(media_player_state).has_state() && id(media_player_state).state == "playing") {
              return "Open Music";
            }
            return "Start Music";
      - lvgl.label.update:
          id: media_play_pause_icon_label
          text: !lambda |-
            if (id(media_player_state).has_state() && id(media_player_state).state == "playing") {
              return "Ⅱ";
            }
            return "▶";
      - lvgl.label.update:
          id: media_title_label
          text: !lambda |-
            if (id(media_track_title).has_state() && !id(media_track_title).state.empty()) {
              return id(media_track_title).state.c_str();
            }
            if (id(media_player_state).has_state() && id(media_player_state).state == "playing") {
              return "Playing";
            }
            return "No track";
      - lvgl.label.update:
          id: media_artist_label
          text: !lambda |-
            if (id(media_track_artist).has_state() && !id(media_track_artist).state.empty()) {
              return id(media_track_artist).state.c_str();
            }
            if (id(media_track_album).has_state() && !id(media_track_album).state.empty()) {
              return id(media_track_album).state.c_str();
            }
            if (id(media_player_state).has_state()) {
              return id(media_player_state).state.c_str();
            }
            return "Rotate = volume";

  - id: reset_idle_timer
    mode: restart
    then:
      - lambda: |-
          id(last_interaction_ms) = millis();
          const bool was_dimmed = id(screen_dimmed);
          id(screen_dimmed) = false;
          if (was_dimmed) {
            ESP_LOGD("ui", "Screen restored from idle dim");
          }
      - script.execute: apply_active_brightness

  - id: update_alarm_status_ui
    then:
      - script.execute: sync_next_alarm_state
      - lvgl.label.update:
          id: snooze_button_label
          text: !lambda |-
            static char snooze_buf[24];
            snprintf(snooze_buf, sizeof(snooze_buf), "Snooze %dm", id(snooze_minutes));
            return snooze_buf;
      - lvgl.label.update:
          id: briefing_prompt_label
          text: !lambda |-
            static char briefing_buf[32];
            if (id(morning_music_prompt_until_ms) == 0 || millis() >= id(morning_music_prompt_until_ms)) {
              snprintf(briefing_buf, sizeof(briefing_buf), "");
              return briefing_buf;
            }
            if (id(morning_briefing_auto_start_ms) != 0 && millis() < id(morning_briefing_auto_start_ms)) {
              const uint32_t remaining_seconds = (id(morning_briefing_auto_start_ms) - millis() + 999) / 1000;
              snprintf(briefing_buf, sizeof(briefing_buf), "Briefing in %us", (unsigned) remaining_seconds);
              return briefing_buf;
            }
            snprintf(briefing_buf, sizeof(briefing_buf), "Choose morning action");
            return briefing_buf;
      - lvgl.label.update:
          id: clock_status_pill_label
          text: !lambda |-
            if (id(morning_music_prompt_until_ms) != 0 && millis() < id(morning_music_prompt_until_ms)) {
              return "BRIEFING";
            }
            if (id(dismiss_feedback_until_ms) != 0 && millis() < id(dismiss_feedback_until_ms)) {
              return "STOPPED";
            }
            if (!id(alarm_enabled)) {
              return "AWAY";
            }
            if (id(snooze_active)) {
              return "SNOOZING";
            }
            if (id(next_ring_override_active)) {
              return "ONE-TIME";
            }
            if (id(skip_next_ring)) {
              return "SKIPPED";
            }
            return "ON";
      - lvgl.widget.update:
          id: clock_status_pill
          bg_color: !lambda |-
            if (id(morning_music_prompt_until_ms) != 0 && millis() < id(morning_music_prompt_until_ms)) {
              return lv_color_hex(0x4B2E63);
            }
            if (id(dismiss_feedback_until_ms) != 0 && millis() < id(dismiss_feedback_until_ms)) {
              return lv_color_hex(0x2A1511);
            }
            if (!id(alarm_enabled)) {
              return lv_color_hex(0xB6F7FF);
            }
            if (id(snooze_active)) {
              return lv_color_hex(0x4DD9E4);
            }
            if (id(next_ring_override_active)) {
              return lv_color_hex(0xFFB59C);
            }
            if (id(skip_next_ring)) {
              return lv_color_hex(0xFFD166);
            }
            return lv_color_hex(0x17351F);
      - lvgl.label.update:
          id: clock_status_pill_label
          text_color: !lambda |-
            if (id(morning_music_prompt_until_ms) != 0 && millis() < id(morning_music_prompt_until_ms)) {
              return lv_color_hex(0xF5D9FF);
            }
            if (id(dismiss_feedback_until_ms) != 0 && millis() < id(dismiss_feedback_until_ms)) {
              return lv_color_hex(0xFFB4AB);
            }
            if (!id(alarm_enabled) || id(snooze_active) || id(next_ring_override_active) || id(skip_next_ring)) {
              return lv_color_hex(0x000000);
            }
            return lv_color_hex(0xB8F5C1);
      - lvgl.widget.update:
          id: clock_state_surface
          bg_color: !lambda |-
            if (id(alarm_ringing)) {
              return id(alarm_flash_on) ? lv_color_hex(0x330A06) : lv_color_hex(0x160302);
            }
            if (!id(alarm_enabled)) {
              return lv_color_hex(0x003E44);
            }
            if (id(snooze_active)) {
              return lv_color_hex(0x001F24);
            }
            return lv_color_hex(0x000000);
      - lvgl.label.update:
          id: clock_time_label
          text_color: !lambda |-
            if (!id(alarm_enabled)) {
              return lv_color_hex(0xF4FFFF);
            }
            if (id(snooze_active)) {
              return lv_color_hex(0x4DD9E4);
            }
            if (id(skip_next_ring)) {
              return lv_color_hex(0xFFD166);
            }
            return lv_color_hex(0xFFB59C);
      - lvgl.label.update:
          id: clock_time_label
          text: !lambda |-
            static char time_buf[8];
            if (id(snooze_active) && id(next_alarm_available)) {
              auto snooze_until = ESPTime::from_epoch_local(id(next_alarm_epoch));
              snprintf(time_buf, sizeof(time_buf), "%02d:%02d", snooze_until.hour, snooze_until.minute);
              return time_buf;
            }
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (!now.is_valid()) {
              snprintf(time_buf, sizeof(time_buf), "--:--");
              return time_buf;
            }
            snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
            return time_buf;
      - lvgl.widget.update:
          id: clock_divider
          bg_color: !lambda |-
            if (!id(alarm_enabled)) {
              return lv_color_hex(0x8DECF2);
            }
            return lv_color_hex(0x3A3D3D);
      - lvgl.label.update:
          id: clock_next_label
          text_color: !lambda |-
            if (!id(alarm_enabled)) {
              return lv_color_hex(0xF4FFFF);
            }
            if (id(dismiss_feedback_until_ms) != 0 && millis() < id(dismiss_feedback_until_ms)) {
              return lv_color_hex(0xFFB4AB);
            }
            return lv_color_hex(0xF4F4F4);
      - lvgl.label.update:
          id: clock_next_label
          text: !lambda |-
            static const char *const day_names[] = {"Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"};
            static char next_buf[48];
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (id(morning_music_prompt_until_ms) != 0 && millis() < id(morning_music_prompt_until_ms)) {
              snprintf(next_buf, sizeof(next_buf), "Choose morning action");
              return next_buf;
            }
            if (id(snooze_active) && id(next_alarm_available)) {
              snprintf(next_buf, sizeof(next_buf), "Snoozed until");
              return next_buf;
            }
            if (!id(alarm_enabled)) {
              snprintf(next_buf, sizeof(next_buf), "Away Mode Active");
              return next_buf;
            }
            if (id(alarm_ringing)) {
              snprintf(next_buf, sizeof(next_buf), "");
              return next_buf;
            }
            if (id(dismiss_feedback_until_ms) != 0 && millis() < id(dismiss_feedback_until_ms)) {
              snprintf(next_buf, sizeof(next_buf), "Stopped");
              return next_buf;
            }
            if (!now.is_valid()) {
              snprintf(next_buf, sizeof(next_buf), "Syncing time");
              return next_buf;
            }
            if (!id(next_alarm_available)) {
              snprintf(next_buf, sizeof(next_buf), "No next ring");
              return next_buf;
            }
            auto next_alarm = ESPTime::from_epoch_local(id(next_alarm_epoch));
            int day_delta = next_alarm.day_of_year - now.day_of_year;
            if (day_delta < 0) {
              day_delta += 366;
            }
            const char *day_text = day_delta == 0 ? "Today" : (day_delta == 1 ? "Tomorrow" : day_names[next_alarm.day_of_week - 1]);
            snprintf(next_buf, sizeof(next_buf), "Next Ring: %s %02d:%02d", day_text, next_alarm.hour, next_alarm.minute);
            return next_buf;
      - lvgl.label.update:
          id: clock_countdown_label
          text: !lambda |-
            static char countdown_buf[32];
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (!now.is_valid() || !id(alarm_enabled) || id(alarm_ringing) || !id(next_alarm_available) ||
                (id(morning_music_prompt_until_ms) != 0 && millis() < id(morning_music_prompt_until_ms)) ||
                (id(dismiss_feedback_until_ms) != 0 && millis() < id(dismiss_feedback_until_ms))) {
              snprintf(countdown_buf, sizeof(countdown_buf), "");
              return countdown_buf;
            }
            const int32_t seconds_until_alarm = int32_t(id(next_alarm_epoch)) - int32_t(now.timestamp);
            if (id(snooze_active)) {
              if (seconds_until_alarm <= 0) {
                snprintf(countdown_buf, sizeof(countdown_buf), "Waking soon");
                return countdown_buf;
              }
              const int minutes_left = (seconds_until_alarm + 59) / 60;
              snprintf(countdown_buf, sizeof(countdown_buf), "%d min left", minutes_left);
              return countdown_buf;
            }
            if (seconds_until_alarm <= 0 || seconds_until_alarm > (8 * 3600)) {
              snprintf(countdown_buf, sizeof(countdown_buf), "");
              return countdown_buf;
            }
            const int hours = seconds_until_alarm / 3600;
            const int minutes = (seconds_until_alarm % 3600) / 60;
            snprintf(countdown_buf, sizeof(countdown_buf), "%dh %dm", hours, minutes);
            return countdown_buf;
      - if:
          condition:
            lambda: "return id(alarm_ringing);"
          then:
            - if:
                condition:
                  lambda: "return !id(ring_controls_visible);"
                then:
                  - lambda: |-
                      id(ring_controls_visible) = true;
                      id(home_menu_visible) = false;
                      id(media_screen_visible) = false;
                  - lvgl.widget.hide: [clock_time_label, clock_divider, clock_status_pill, clock_next_label, clock_countdown_label, clock_resume_button, center_tap_button, home_menu_panel, all_lights_off_button, close_menu_button, briefing_prompt_panel, menu_music_play_button, media_screen_panel]
                  - lvgl.widget.show: [clock_state_surface, ring_title_label, snooze_button, stop_button, snooze_hint_label]
          else:
            - if:
                condition:
                  lambda: "return id(ring_controls_visible);"
                then:
                  - lambda: |-
                      id(ring_controls_visible) = false;
                  - lvgl.widget.hide: [ring_title_label, snooze_button, stop_button, snooze_hint_label]
            - if:
                condition:
                  lambda: "return id(media_screen_visible);"
                then:
                  - lvgl.widget.hide: [clock_state_surface, clock_time_label, clock_divider, clock_status_pill, clock_next_label, clock_countdown_label, clock_resume_button, center_tap_button, home_menu_panel, all_lights_off_button, menu_music_play_button, close_menu_button, briefing_prompt_panel, ring_title_label, snooze_button, stop_button, snooze_hint_label]
                  - lvgl.widget.show: [media_screen_panel]
                else:
                  - lvgl.widget.hide: [media_screen_panel]
                  - if:
                      condition:
                        lambda: "return id(home_menu_visible);"
                      then:
                        - lvgl.widget.hide: [clock_time_label, clock_divider, clock_status_pill, clock_next_label, clock_countdown_label, clock_resume_button, center_tap_button, briefing_prompt_panel, ring_title_label, snooze_button, stop_button, snooze_hint_label]
                        - lvgl.widget.show: [clock_state_surface, home_menu_panel, all_lights_off_button, menu_music_play_button, close_menu_button]
                      else:
                        - lvgl.widget.hide: [home_menu_panel, all_lights_off_button, menu_music_play_button, close_menu_button, ring_title_label, snooze_button, stop_button, snooze_hint_label]
                        - lvgl.widget.show: [clock_state_surface, clock_time_label, clock_divider, clock_next_label, clock_countdown_label, center_tap_button]
                  - if:
                      condition:
                        lambda: |-
                          return !id(home_menu_visible) && !id(media_screen_visible) && !id(alarm_ringing);
                      then:
                        - lvgl.widget.show: [clock_status_pill]
                      else:
                        - lvgl.widget.hide: [clock_status_pill]
                  - if:
                      condition:
                        lambda: |-
                          return !id(home_menu_visible) && !id(media_screen_visible) && !id(alarm_ringing) &&
                                 (!id(alarm_enabled) || id(skip_next_ring));
                      then:
                        - lvgl.widget.show: [clock_resume_button]
                      else:
                        - lvgl.widget.hide: [clock_resume_button]
                  - if:
                      condition:
                        lambda: |-
                          return !id(home_menu_visible) && !id(media_screen_visible) &&
                                 id(morning_music_prompt_until_ms) != 0 && millis() < id(morning_music_prompt_until_ms);
                      then:
                        - lvgl.widget.show: [briefing_prompt_panel]
                      else:
                        - lvgl.widget.hide: [briefing_prompt_panel]

  - id: apply_snooze_duration
    parameters:
      minutes: int
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) {
            now = id(rtctime).now();
          }
          if (!now.is_valid()) {
            ESP_LOGW("alarm", "Snooze requested but current time is invalid");
            return;
          }
          auto snooze_until = esphome::ESPTime::from_epoch_local(now.timestamp + (minutes * 60));
          id(snooze_active) = true;
          id(snooze_day_of_year) = snooze_until.day_of_year;
          id(snooze_hour) = snooze_until.hour;
          id(snooze_minute) = snooze_until.minute;
          ESP_LOGI("alarm", "Snoozed for %d minutes until day=%d %02d:%02d", minutes, id(snooze_day_of_year), id(snooze_hour), id(snooze_minute));
      - script.execute: stop_alarm
      - script.execute: update_minutes_hand

  - id: snooze_alarm
    then:
      - script.execute:
          id: apply_snooze_duration
          minutes: !lambda "return id(snooze_minutes);"

  - id: snooze_alarm_five_minutes
    then:
      - script.execute:
          id: apply_snooze_duration
          minutes: 5

  - id: start_alarm
    mode: restart
    then:
      - script.execute: clear_snooze
      - lambda: |-
          id(next_ring_override_active) = false;
          id(next_ring_override_epoch) = 0;
          id(snooze_minutes) = 10;
          id(alarm_ringing) = true;
          id(home_menu_visible) = false;
          id(media_screen_visible) = false;
          auto now = id(sntp_time).now();
          if (!now.is_valid()) {
            now = id(rtctime).now();
          }
          ESP_LOGI("alarm", "Starting alarm at %02d:%02d:%02d", now.hour, now.minute, now.second);
      - script.execute: apply_active_brightness
      - script.execute: update_minutes_hand
      - script.execute: start_alarm_media_on_ha
      - script.execute: alarm_loop
      - script.execute: alarm_timeout

  - id: stop_alarm
    then:
      - lambda: |-
          if (id(alarm_ringing)) {
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            ESP_LOGI("alarm", "Stopping alarm at %02d:%02d:%02d", now.hour, now.minute, now.second);
          }
          id(alarm_ringing) = false;
      - script.stop: alarm_loop
      - script.stop: alarm_timeout
      - output.turn_off: buzzer
      - script.execute: stop_alarm_media_on_ha
      - script.execute: update_minutes_hand
      - script.execute: reset_idle_timer

  - id: alarm_loop
    mode: restart
    then:
      - while:
          condition:
            lambda: "return id(alarm_ringing);"
          then:
            - output.ledc.set_frequency:
                id: buzzer
                frequency: "3200Hz"
            - output.set_level:
                id: buzzer
                level: 50%
            - delay: 950ms
            - output.turn_off: buzzer
            - delay: 100ms
            - output.ledc.set_frequency:
                id: buzzer
                frequency: "2800Hz"
            - output.set_level:
                id: buzzer
                level: 50%
            - delay: 950ms
            - output.turn_off: buzzer
            - delay: 250ms

  - id: alarm_timeout
    mode: restart
    then:
      - delay: 5min
      - if:
          condition:
            lambda: "return id(alarm_ringing);"
          then:
            - logger.log: "Alarm timed out after 5 minutes"
            - script.execute: stop_alarm

  - id: update_minutes_hand
    then:
      - lvgl.label.update:
          id: clock_time_label
          text: !lambda |-
            static char time_buf[8];
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (!now.is_valid()) {
              snprintf(time_buf, sizeof(time_buf), "--:--");
              return time_buf;
            }
            snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
            return time_buf;
      - script.execute: update_alarm_status_ui
