substitutions:
  alarm_audio_player_entity: media_player.example_speaker
  alarm_audio_start_action: script.alarmv1_start_alarm_audio
  alarm_audio_stop_action: media_player.media_stop
  morning_briefing_action: script.alarmv1_morning_briefing
  morning_briefing_player_entity: media_player.example_speaker
  home_lights_off_action: light.turn_off
  home_lights_off_entity: all
  timezone: Etc/UTC

esphome:
  name: esphome-web-56058c
  friendly_name: AlarmV1
  min_version: 2025.11.0
  name_add_mac_suffix: false
  on_boot:
    priority: -10
    then:
      - lambda: |-
          ESP_LOGI("boot", "boot step 1: on_boot started");
      - output.set_max_power:
          id: buzzer
          max_power: 100%
      - lambda: |-
          ESP_LOGI("boot", "boot step 2: buzzer max power applied");
      - delay: 2s
      - lambda: |-
          ESP_LOGI("boot", "boot step 3: startup delay complete");
      - script.execute: reset_idle_timer
      - lambda: |-
          ESP_LOGI("boot", "boot step 4: reset_idle_timer executed");
      - script.execute: update_minutes_hand
      - lambda: |-
          ESP_LOGI("boot", "boot step 5: update_minutes_hand executed");
      - delay: 3s
      - safe_mode.mark_successful
      - lambda: |-
          ESP_LOGI("boot", "boot step 6: marked boot successful");

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

safe_mode:
  boot_is_good_after: 5s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

preferences:
  flash_write_interval: 10s

api:
  reboot_timeout: 0s

web_server:

ota:
  - platform: esphome

logger:

i2c:
  - id: internal_i2c
    sda: GPIO11
    scl: GPIO12

rc522_i2c:
  - id: nfc_reader
    i2c_id: internal_i2c
    address: 0x28

output:
  - platform: ledc
    pin:
      number: GPIO3
      ignore_strapping_warning: true
    id: buzzer
    frequency: 2000 Hz
  - platform: ledc
    pin: GPIO9
    id: backlight_output

globals:
  - id: alarm_enabled
    type: bool
    restore_value: yes
    initial_value: "true"
  - id: alarm_ringing
    type: bool
    restore_value: no
    initial_value: "false"
  - id: skip_next_ring
    type: bool
    restore_value: yes
    initial_value: "false"
  - id: skip_next_ring_epoch
    type: uint32_t
    restore_value: yes
    initial_value: "0"
  - id: last_alarm_minute_key
    type: int
    restore_value: no
    initial_value: "-1"
  - id: last_alarm_debug_minute_key
    type: int
    restore_value: no
    initial_value: "-1"
  - id: last_ui_minute_key
    type: int
    restore_value: no
    initial_value: "-1"
  - id: snooze_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: snooze_minutes
    type: int
    restore_value: yes
    initial_value: "10"
  - id: snooze_day_of_year
    type: int
    restore_value: no
    initial_value: "-1"
  - id: snooze_hour
    type: int
    restore_value: no
    initial_value: "-1"
  - id: snooze_minute
    type: int
    restore_value: no
    initial_value: "-1"
  - id: last_encoder_turn_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: last_encoder_direction
    type: int
    restore_value: no
    initial_value: "0"
  - id: alarm_flash_on
    type: bool
    restore_value: no
    initial_value: "false"
  - id: last_interaction_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: last_touch_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: screen_dimmed
    type: bool
    restore_value: no
    initial_value: "false"
  - id: wake_only_touch_until_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: ring_controls_visible
    type: bool
    restore_value: no
    initial_value: "false"
  - id: home_menu_visible
    type: bool
    restore_value: no
    initial_value: "false"
  - id: media_screen_visible
    type: bool
    restore_value: no
    initial_value: "false"
  - id: media_volume_level
    type: float
    restore_value: no
    initial_value: "0.5"
  - id: media_volume_overlay_until_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: dismiss_feedback_until_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: morning_music_prompt_until_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: morning_briefing_auto_start_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: morning_music_start_pending
    type: bool
    restore_value: no
    initial_value: "false"
  - id: next_ring_override_active
    type: bool
    restore_value: yes
    initial_value: "false"
  - id: next_ring_override_epoch
    type: uint32_t
    restore_value: yes
    initial_value: "0"
  - id: next_alarm_available
    type: bool
    restore_value: no
    initial_value: "false"
  - id: next_alarm_epoch
    type: uint32_t
    restore_value: no
    initial_value: "0"

switch:
  - platform: template
    id: alarm_enabled_switch
    name: "Alarm Enabled"
    icon: "mdi:alarm-check"
    restore_mode: RESTORE_DEFAULT_ON
    lambda: |-
      return id(alarm_enabled);
    turn_on_action:
      - lambda: |-
          id(alarm_enabled) = true;
          ESP_LOGI("alarm", "Alarm enabled");
      - script.execute: update_minutes_hand
      - script.execute: reset_idle_timer
    turn_off_action:
      - lambda: |-
          id(alarm_enabled) = false;
          id(skip_next_ring) = false;
          id(skip_next_ring_epoch) = 0;
          id(next_ring_override_active) = false;
          id(next_ring_override_epoch) = 0;
          ESP_LOGI("alarm", "Alarm disabled / away mode enabled");
      - script.execute: clear_snooze
      - script.execute: stop_alarm
      - script.execute: update_minutes_hand
      - script.execute: reset_idle_timer

button:
  - platform: template
    name: "Stop Alarm"
    icon: "mdi:alarm-off"
    on_press:
      - script.execute: dismiss_alarm
      - script.execute: reset_idle_timer
  - platform: template
    name: "Test Alarm"
    icon: "mdi:alarm-light"
    on_press:
      - logger.log: "Manual test alarm requested"
      - script.execute: clear_snooze
      - script.execute: start_alarm
      - script.execute: reset_idle_timer

sensor:
  - platform: rotary_encoder
    id: encoder
    pin_a: GPIO40
    pin_b: GPIO41
    on_clockwise:
      - script.execute: reset_idle_timer
      - lambda: |-
          const int direction = 1;
          const uint32_t now_ms = millis();
          uint32_t delta_ms = now_ms - id(last_encoder_turn_ms);
          if (id(last_encoder_direction) != direction) {
            delta_ms = 1000;
          }
          id(last_encoder_turn_ms) = now_ms;
          id(last_encoder_direction) = direction;

          int step_minutes = 1;
          if (delta_ms < 70) {
            step_minutes = 15;
          } else if (delta_ms < 140) {
            step_minutes = 5;
          }

          if (id(media_screen_visible)) {
            id(media_volume_level) += 0.05f;
            if (id(media_volume_level) > 1.0f) {
              id(media_volume_level) = 1.0f;
            }
            ESP_LOGI("media", "Volume adjusted clockwise to %.0f%%", id(media_volume_level) * 100.0f);
            id(show_media_volume_overlay).execute();
            id(set_morning_music_volume_on_ha).execute();
            return;
          }

          if (id(alarm_ringing)) {
            id(snooze_minutes) += step_minutes;
            if (id(snooze_minutes) > 60) {
              id(snooze_minutes) = 60;
            }
            ESP_LOGI("alarm", "Snooze duration set to %d minutes (delta=%ums, step=%d)", id(snooze_minutes), delta_ms, step_minutes);
            id(update_alarm_status_ui).execute();
            return;
          }

          if (id(snooze_active)) {
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (!now.is_valid()) {
              ESP_LOGW("alarm", "Ignoring clockwise encoder turn while snoozed because current time is invalid");
              return;
            }
            uint32_t candidate_epoch = id(next_alarm_available) ? id(next_alarm_epoch) : uint32_t(now.timestamp + (id(snooze_minutes) * 60));
            const uint32_t max_epoch = uint32_t(now.timestamp + (60 * 60));
            candidate_epoch += (step_minutes * 60);
            if (candidate_epoch > max_epoch) {
              candidate_epoch = max_epoch;
            }
            auto snooze_until = ESPTime::from_epoch_local(candidate_epoch);
            id(snooze_day_of_year) = snooze_until.day_of_year;
            id(snooze_hour) = snooze_until.hour;
            id(snooze_minute) = snooze_until.minute;
            ESP_LOGI("alarm", "Active snooze adjusted clockwise to %02d:%02d", id(snooze_hour), id(snooze_minute));
            id(update_minutes_hand).execute();
            return;
          }

          if (id(skip_next_ring)) {
            ESP_LOGI("alarm", "Ignoring encoder turn while next ring is skipped");
            return;
          }

          auto now = id(sntp_time).now();
          if (!now.is_valid()) {
            now = id(rtctime).now();
          }
          if (!now.is_valid() || !id(next_alarm_available)) {
            ESP_LOGW("alarm", "Ignoring clockwise encoder turn because next ring is unavailable");
            return;
          }
          uint32_t candidate_epoch = id(next_alarm_epoch) + (step_minutes * 60);
          const uint32_t min_epoch = ((uint32_t(now.timestamp) / 60) + 1) * 60;
          if (candidate_epoch < min_epoch) {
            candidate_epoch = min_epoch;
          }
          id(next_ring_override_active) = true;
          id(next_ring_override_epoch) = candidate_epoch;
          id(update_minutes_hand).execute();
          auto next_alarm = ESPTime::from_epoch_local(candidate_epoch);
          ESP_LOGI("alarm", "Next ring override adjusted clockwise by %d minutes to %02d:%02d", step_minutes, next_alarm.hour, next_alarm.minute);
    on_anticlockwise:
      - script.execute: reset_idle_timer
      - lambda: |-
          const int direction = -1;
          const uint32_t now_ms = millis();
          uint32_t delta_ms = now_ms - id(last_encoder_turn_ms);
          if (id(last_encoder_direction) != direction) {
            delta_ms = 1000;
          }
          id(last_encoder_turn_ms) = now_ms;
          id(last_encoder_direction) = direction;

          int step_minutes = 1;
          if (delta_ms < 70) {
            step_minutes = 15;
          } else if (delta_ms < 140) {
            step_minutes = 5;
          }

          if (id(media_screen_visible)) {
            id(media_volume_level) -= 0.05f;
            if (id(media_volume_level) < 0.0f) {
              id(media_volume_level) = 0.0f;
            }
            ESP_LOGI("media", "Volume adjusted anticlockwise to %.0f%%", id(media_volume_level) * 100.0f);
            id(show_media_volume_overlay).execute();
            id(set_morning_music_volume_on_ha).execute();
            return;
          }

          if (id(alarm_ringing)) {
            id(snooze_minutes) -= step_minutes;
            if (id(snooze_minutes) < 5) {
              id(snooze_minutes) = 5;
            }
            ESP_LOGI("alarm", "Snooze duration set to %d minutes (delta=%ums, step=%d)", id(snooze_minutes), delta_ms, step_minutes);
            id(update_alarm_status_ui).execute();
            return;
          }

          if (id(snooze_active)) {
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (!now.is_valid()) {
              ESP_LOGW("alarm", "Ignoring anticlockwise encoder turn while snoozed because current time is invalid");
              return;
            }
            int32_t candidate_epoch = int32_t(id(next_alarm_available) ? id(next_alarm_epoch) : uint32_t(now.timestamp + (id(snooze_minutes) * 60)));
            const int32_t min_epoch = int32_t(((uint32_t(now.timestamp) / 60) + 1) * 60);
            candidate_epoch -= (step_minutes * 60);
            if (candidate_epoch < min_epoch) {
              candidate_epoch = min_epoch;
            }
            auto snooze_until = ESPTime::from_epoch_local(uint32_t(candidate_epoch));
            id(snooze_day_of_year) = snooze_until.day_of_year;
            id(snooze_hour) = snooze_until.hour;
            id(snooze_minute) = snooze_until.minute;
            ESP_LOGI("alarm", "Active snooze adjusted anticlockwise to %02d:%02d", id(snooze_hour), id(snooze_minute));
            id(update_minutes_hand).execute();
            return;
          }

          if (id(skip_next_ring)) {
            ESP_LOGI("alarm", "Ignoring encoder turn while next ring is skipped");
            return;
          }

          auto now = id(sntp_time).now();
          if (!now.is_valid()) {
            now = id(rtctime).now();
          }
          if (!now.is_valid() || !id(next_alarm_available)) {
            ESP_LOGW("alarm", "Ignoring anticlockwise encoder turn because next ring is unavailable");
            return;
          }
          int32_t candidate_epoch = int32_t(id(next_alarm_epoch)) - (step_minutes * 60);
          const uint32_t min_epoch = ((uint32_t(now.timestamp) / 60) + 1) * 60;
          if (candidate_epoch < int32_t(min_epoch)) {
            candidate_epoch = int32_t(min_epoch);
          }
          id(next_ring_override_active) = true;
          id(next_ring_override_epoch) = uint32_t(candidate_epoch);
          id(update_minutes_hand).execute();
          auto next_alarm = ESPTime::from_epoch_local(uint32_t(candidate_epoch));
          ESP_LOGI("alarm", "Next ring override adjusted anticlockwise by %d minutes to %02d:%02d", step_minutes, next_alarm.hour, next_alarm.minute);

  - platform: homeassistant
    id: media_player_volume
    entity_id: ${morning_briefing_player_entity}
    attribute: volume_level
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!isnan(x)) {
              id(media_volume_level) = x;
            }
        - script.execute: update_media_screen_ui

time:
  - platform: pcf8563
    id: rtctime
    i2c_id: internal_i2c
    address: 0x51
    update_interval: never

  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
    on_time_sync:
      then:
        - logger.log: "SNTP time sync received, writing time back to RTC"
        - pcf8563.write_time:
        - script.execute: update_minutes_hand
        - script.execute: sync_alarm_day_state

datetime:
  - platform: template
    id: weekday_alarm_time
    name: "Weekday Alarm Time"
    type: time
    icon: "mdi:calendar-week"
    initial_value: "07:00:00"
    restore_value: true
    optimistic: yes
    on_value:
      then:
        - script.execute: update_minutes_hand
  - platform: template
    id: weekend_alarm_time
    name: "Weekend Alarm Time"
    type: time
    icon: "mdi:calendar-weekend"
    initial_value: "09:00:00"
    restore_value: true
    optimistic: yes
    on_value:
      then:
        - script.execute: update_minutes_hand
text_sensor:
  - platform: homeassistant
    id: media_player_state
    entity_id: ${morning_briefing_player_entity}
    internal: true
    on_value:
      then:
        - script.execute: update_media_screen_ui
  - platform: homeassistant
    id: media_track_title
    entity_id: ${morning_briefing_player_entity}
    attribute: media_title
    internal: true
    on_value:
      then:
        - script.execute: update_media_screen_ui
  - platform: homeassistant
    id: media_track_artist
    entity_id: ${morning_briefing_player_entity}
    attribute: media_artist
    internal: true
    on_value:
      then:
        - script.execute: update_media_screen_ui
  - platform: homeassistant
    id: media_track_album
    entity_id: ${morning_briefing_player_entity}
    attribute: media_album_name
    internal: true
    on_value:
      then:
        - script.execute: update_media_screen_ui
  - platform: template
    id: next_alarm_time_text
    name: "Next Alarm Time"
    icon: "mdi:calendar-clock"
    device_class: timestamp
    update_interval: 30s
    lambda: |-
      auto now = id(sntp_time).now();
      if (!now.is_valid()) {
        now = id(rtctime).now();
      }
      if (!now.is_valid()) {
        return {""};
      }
      if (!id(alarm_enabled)) {
        return {""};
      }
      if (!id(next_alarm_available)) {
        return {""};
      }

      time_t candidate_epoch = id(next_alarm_epoch);
      auto local = ESPTime::from_epoch_local(candidate_epoch);
      char base_buf[32];
      local.strftime(base_buf, sizeof(base_buf), "%Y-%m-%dT%H:%M:%S");
      int32_t tz_offset = ESPTime::timezone_offset();
      char sign = '+';
      if (tz_offset < 0) {
        sign = '-';
        tz_offset = -tz_offset;
      }
      int tz_hours = tz_offset / 3600;
      int tz_minutes = (tz_offset % 3600) / 60;
      char out_buf[40];
      snprintf(out_buf, sizeof(out_buf), "%s%c%02d:%02d", base_buf, sign, tz_hours, tz_minutes);
      return {out_buf};

binary_sensor:
  - platform: gpio
    name: Button
    id: front_button
    pin:
      number: GPIO42
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_multi_click:
      - timing:
          - ON for at least 3s
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: "return id(alarm_ringing) || id(snooze_active);"
              then:
                - script.execute: dismiss_alarm
              else:
                - script.execute: home_all_lights_off
                - script.execute: close_home_menu
          - script.execute: reset_idle_timer
      - timing:
          - ON for at most 500ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: "return id(alarm_ringing);"
              then:
                - script.execute: snooze_alarm_five_minutes
              else:
                - if:
                    condition:
                      lambda: "return !id(media_screen_visible);"
                    then:
                      - if:
                          condition:
                            lambda: "return id(home_menu_visible);"
                          then:
                            - script.execute: close_home_menu
                          else:
                            - script.execute: open_home_menu
          - script.execute: reset_idle_timer

spi:
  id: spi_bus
  mosi_pin: GPIO5
  clk_pin: GPIO6

touchscreen:
  platform: ft5x06
  id: dial_touchscreen
  i2c_id: internal_i2c
  address: 0x38
  interrupt_pin: GPIO14
  touch_timeout: 250ms
  on_touch:
    - if:
        condition:
          lambda: |-
            const uint32_t now_ms = millis();
            if (now_ms - id(last_touch_ms) < 700) {
              return false;
            }
            id(last_touch_ms) = now_ms;
            bool night_dim_mode = false;
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (now.is_valid() && (now.hour >= 23 || now.hour < 7)) {
              night_dim_mode = true;
            }
            if (id(screen_dimmed) && night_dim_mode) {
              id(wake_only_touch_until_ms) = now_ms + 1200;
              ESP_LOGD("ui", "Night dim tap wakes screen only");
            }
            return true;
        then:
          - script.execute: reset_idle_timer

light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_output
    id: display_backlight
    default_transition_length: 0s

display:
  - platform: mipi_spi
    id: round_display
    model: GC9A01A
    cs_pin: GPIO7
    reset_pin: GPIO8
    dc_pin: GPIO4
    color_order: bgr
    invert_colors: true
    auto_clear_enabled: false
    update_interval: never
    data_rate: 40MHz

font:
  # Lumina/Digital redesign fonts: Hanken Grotesk for clock/menu/alarm UI,
  # DejaVu Sans retained for media metadata because it already covers Cyrillic.
  - file: assets/HankenGrotesk-Bold.ttf
    id: clock_time_font_82
    size: 82
    glyphs: "0123456789:"
  - file: assets/HankenGrotesk-SemiBold.ttf
    id: clock_label_font_12
    size: 12
    glyphs: &clock_text_glyphs ' ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789:-,./+'
  - file: assets/HankenGrotesk-SemiBold.ttf
    id: clock_body_font_16
    size: 16
    glyphs: *clock_text_glyphs
  - file: assets/HankenGrotesk-SemiBold.ttf
    id: clock_body_font_18
    size: 18
    glyphs: *clock_text_glyphs
  - file: assets/HankenGrotesk-Bold.ttf
    id: clock_body_font_20
    size: 20
    glyphs: *clock_text_glyphs
  - file: assets/DejaVuSans.ttf
    id: media_text_font_14
    size: 14
    glyphs: &media_glyphs " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz[]_{}|~°▶Ⅱ■»♪АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯабвгдеёжзийклмнопрстуфхцчшщъыьэюя"
  - file: assets/DejaVuSans.ttf
    id: media_text_font_16
    size: 16
    glyphs: *media_glyphs
  - file: assets/DejaVuSans.ttf
    id: media_text_font_18
    size: 18
    glyphs: *media_glyphs
  - file: assets/DejaVuSans.ttf
    id: media_icon_font_28
    size: 28
    glyphs: "▶Ⅱ■»"

lvgl:
  rotation: 0
  displays:
    - round_display
  touchscreens:
    - touchscreen_id: dial_touchscreen
      long_press_time: 700ms
  style_definitions:
    - id: date_style
      text_font: clock_body_font_16
      align: center
      text_color: White
      bg_opa: TRANSP
      radius: 4
      pad_all: 2
  pages:
    - id: main_page
      height: 100%
      width: 100%
      bg_color: Black
      widgets:
        - obj:
            id: clock_state_surface
            width: 100%
            height: 100%
            align: CENTER
            bg_color: Black
            bg_opa: COVER
