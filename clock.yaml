esphome:
  name: esphome-web-56058c
  friendly_name: AlarmV1
  min_version: 2025.11.0
  name_add_mac_suffix: false
  on_boot:
    priority: -10
    then:
      - lambda: |-
          ESP_LOGI("boot", "boot step 1: on_boot started");
      - output.set_max_power:
          id: buzzer
          max_power: 100%
      - lambda: |-
          ESP_LOGI("boot", "boot step 2: buzzer max power applied");
      - delay: 2s
      - lambda: |-
          ESP_LOGI("boot", "boot step 3: startup delay complete");
      - script.execute: reset_idle_timer
      - lambda: |-
          ESP_LOGI("boot", "boot step 4: reset_idle_timer executed");
      - script.execute: update_minutes_hand
      - lambda: |-
          ESP_LOGI("boot", "boot step 5: update_minutes_hand executed");
      - delay: 3s
      - safe_mode.mark_successful
      - lambda: |-
          ESP_LOGI("boot", "boot step 6: marked boot successful");

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

safe_mode:
  boot_is_good_after: 5s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  reboot_timeout: 0s

web_server:

ota:
  - platform: esphome

logger:

i2c:
  - id: internal_i2c
    sda: GPIO11
    scl: GPIO12

rc522_i2c:
  - id: nfc_reader
    i2c_id: internal_i2c
    address: 0x28

output:
  - platform: ledc
    pin: GPIO3
    id: buzzer
    frequency: 2000 Hz
  - platform: ledc
    pin: GPIO9
    id: backlight_output

globals:
  - id: alarm_enabled
    type: bool
    restore_value: yes
    initial_value: "true"
  - id: alarm_ringing
    type: bool
    restore_value: no
    initial_value: "false"
  - id: alarm_disabled_today
    type: bool
    restore_value: yes
    initial_value: "false"
  - id: alarm_disabled_day
    type: int
    restore_value: yes
    initial_value: "-1"
  - id: last_alarm_minute_key
    type: int
    restore_value: no
    initial_value: "-1"
  - id: last_alarm_debug_minute_key
    type: int
    restore_value: no
    initial_value: "-1"
  - id: last_ui_minute_key
    type: int
    restore_value: no
    initial_value: "-1"
  - id: snooze_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: snooze_minutes
    type: int
    restore_value: yes
    initial_value: "10"
  - id: snooze_day_of_year
    type: int
    restore_value: no
    initial_value: "-1"
  - id: snooze_hour
    type: int
    restore_value: no
    initial_value: "-1"
  - id: snooze_minute
    type: int
    restore_value: no
    initial_value: "-1"
  - id: last_encoder_turn_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: last_encoder_direction
    type: int
    restore_value: no
    initial_value: "0"
  - id: alarm_flash_on
    type: bool
    restore_value: no
    initial_value: "false"
  - id: last_interaction_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: last_touch_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: screen_dimmed
    type: bool
    restore_value: no
    initial_value: "false"
  - id: ring_controls_visible
    type: bool
    restore_value: no
    initial_value: "false"

switch:
  - platform: template
    id: alarm_enabled_switch
    name: "Alarm Enabled"
    icon: "mdi:alarm-check"
    lambda: |-
      return id(alarm_enabled);
    turn_on_action:
      - lambda: |-
          id(alarm_enabled) = true;
          ESP_LOGI("alarm", "Alarm enabled");
      - script.execute: update_minutes_hand
      - script.execute: reset_idle_timer
    turn_off_action:
      - lambda: |-
          id(alarm_enabled) = false;
          ESP_LOGI("alarm", "Alarm disabled");
      - script.execute: clear_snooze
      - script.execute: stop_alarm
      - script.execute: update_minutes_hand
      - script.execute: reset_idle_timer

button:
  - platform: template
    name: "Stop Alarm"
    icon: "mdi:alarm-off"
    on_press:
      - script.execute: dismiss_alarm
      - script.execute: reset_idle_timer
  - platform: template
    name: "Test Alarm"
    icon: "mdi:alarm-light"
    on_press:
      - logger.log: "Manual test alarm requested"
      - script.execute: clear_snooze
      - script.execute: start_alarm
      - script.execute: reset_idle_timer

sensor:
  - platform: rotary_encoder
    id: encoder
    pin_a: GPIO40
    pin_b: GPIO41
    on_clockwise:
      - script.execute: reset_idle_timer
      - lambda: |-
          const int direction = 1;
          const uint32_t now_ms = millis();
          uint32_t delta_ms = now_ms - id(last_encoder_turn_ms);
          if (id(last_encoder_direction) != direction) {
            delta_ms = 1000;
          }
          id(last_encoder_turn_ms) = now_ms;
          id(last_encoder_direction) = direction;

          int step_minutes = 5;
          if (delta_ms < 70) {
            step_minutes = 30;
          } else if (delta_ms < 140) {
            step_minutes = 15;
          }

          if (id(alarm_ringing)) {
            id(snooze_minutes) += step_minutes;
            if (id(snooze_minutes) > 60) {
              id(snooze_minutes) = 60;
            }
            ESP_LOGI("alarm", "Snooze duration set to %d minutes (delta=%ums, step=%d)", id(snooze_minutes), delta_ms, step_minutes);
            id(update_alarm_status_ui).execute();
            return;
          }

          if (id(snooze_active)) {
            ESP_LOGI("alarm", "Ignoring clockwise encoder turn while alarm is snoozed");
            return;
          }

          auto alarm_time_var = id(alarm_time).state_as_esptime();
          int total_minutes = alarm_time_var.hour * 60 + alarm_time_var.minute + step_minutes;
          total_minutes %= 1440;
          alarm_time_var.hour = total_minutes / 60;
          alarm_time_var.minute = total_minutes % 60;
          id(alarm_time).make_call().set_time(alarm_time_var).perform();
          ESP_LOGI("alarm", "Alarm time adjusted clockwise by %d minutes (delta=%ums)", step_minutes, delta_ms);
    on_anticlockwise:
      - script.execute: reset_idle_timer
      - lambda: |-
          const int direction = -1;
          const uint32_t now_ms = millis();
          uint32_t delta_ms = now_ms - id(last_encoder_turn_ms);
          if (id(last_encoder_direction) != direction) {
            delta_ms = 1000;
          }
          id(last_encoder_turn_ms) = now_ms;
          id(last_encoder_direction) = direction;

          int step_minutes = 5;
          if (delta_ms < 70) {
            step_minutes = 30;
          } else if (delta_ms < 140) {
            step_minutes = 15;
          }

          if (id(alarm_ringing)) {
            id(snooze_minutes) -= step_minutes;
            if (id(snooze_minutes) < 5) {
              id(snooze_minutes) = 5;
            }
            ESP_LOGI("alarm", "Snooze duration set to %d minutes (delta=%ums, step=%d)", id(snooze_minutes), delta_ms, step_minutes);
            id(update_alarm_status_ui).execute();
            return;
          }

          if (id(snooze_active)) {
            ESP_LOGI("alarm", "Ignoring anticlockwise encoder turn while alarm is snoozed");
            return;
          }

          auto alarm_time_var = id(alarm_time).state_as_esptime();
          int total_minutes = alarm_time_var.hour * 60 + alarm_time_var.minute - step_minutes;
          while (total_minutes < 0) {
            total_minutes += 1440;
          }
          alarm_time_var.hour = total_minutes / 60;
          alarm_time_var.minute = total_minutes % 60;
          id(alarm_time).make_call().set_time(alarm_time_var).perform();
          ESP_LOGI("alarm", "Alarm time adjusted anticlockwise by %d minutes (delta=%ums)", step_minutes, delta_ms);

time:
  - platform: pcf8563
    id: rtctime
    i2c_id: internal_i2c
    address: 0x51
    update_interval: never

  - platform: sntp
    id: sntp_time
    timezone: Asia/Yerevan
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
    on_time_sync:
      then:
        - logger.log: "SNTP time sync received, writing time back to RTC"
        - pcf8563.write_time:
        - script.execute: update_minutes_hand
        - script.execute: sync_alarm_day_state

datetime:
  - platform: template
    id: alarm_time
    name: "Alarm Time"
    type: time
    icon: "mdi:alarm"
    initial_value: "07:00:00"
    restore_value: true
    optimistic: yes
    on_value:
      then:
        - script.execute: update_minutes_hand

binary_sensor:
  - platform: gpio
    name: Button
    id: front_button
    pin:
      number: GPIO42
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_multi_click:
      - timing:
          - ON for at least 3s
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: "return id(alarm_ringing);"
              then:
                - script.execute: dismiss_alarm
          - script.execute: reset_idle_timer
      - timing:
          - ON for at most 500ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: "return id(alarm_ringing);"
              then:
                - script.execute: snooze_alarm_five_minutes
          - script.execute: reset_idle_timer

spi:
  id: spi_bus
  mosi_pin: GPIO5
  clk_pin: GPIO6

touchscreen:
  platform: ft5x06
  id: dial_touchscreen
  i2c_id: internal_i2c
  address: 0x38
  touch_timeout: 250ms
  on_touch:
    - if:
        condition:
          lambda: |-
            const uint32_t now_ms = millis();
            if (now_ms - id(last_touch_ms) < 700) {
              return false;
            }
            id(last_touch_ms) = now_ms;
            return true;
        then:
          - script.execute: reset_idle_timer

light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_output
    id: display_backlight
    default_transition_length: 0s

display:
  - platform: mipi_spi
    id: round_display
    model: GC9A01A
    cs_pin: GPIO7
    reset_pin: GPIO8
    dc_pin: GPIO4
    color_order: bgr
    invert_colors: true
    auto_clear_enabled: false
    update_interval: never
    data_rate: 40MHz

lvgl:
  rotation: 270
  displays:
    - round_display
  touchscreens:
    - touchscreen_id: dial_touchscreen
  style_definitions:
    - id: date_style
      text_font: montserrat_14
      align: center
      text_color: White
      bg_opa: TRANSP
      radius: 4
      pad_all: 2
  pages:
    - id: main_page
      height: 100%
      width: 100%
      bg_color: Black
      widgets:
        - meter:
            height: 100%
            width: 100%
            align: CENTER
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            text_color: White
            scales:
              - range_from: 0
                range_to: 60
                angle_range: 360
                rotation: 270
                ticks:
                  width: 1
                  count: 61
                  length: 10
                  color: White
                indicators:
                  - line:
                      id: minute_hand
                      width: 2
                      color: White
                      length: 95
                      value: 0
              - range_from: 1
                range_to: 12
                angle_range: 330
                rotation: 300
                ticks:
                  width: 1
                  count: 12
                  length: 1
                  major:
                    stride: 1
                    width: 4
                    length: 10
                    color: White
                    label_gap: 12
              - range_from: 0
                range_to: 720
                angle_range: 360
                rotation: 270
                ticks:
                  count: 2
                  width: 1
                  length: 1
                  color: 0x000000
                indicators:
                  - line:
                      id: hour_hand
                      width: 4
                      color: White
                      length: 80
                      value: 0
                  - line:
                      id: secs_hand
                      width: 1
                      color: Red
                      length: 105
                      value: 0
        - obj:
            id: alarm_status_circle
            width: 120
            height: 120
            align: CENTER
            bg_color: Black
            bg_opa: 85%
            radius: 60
            clip_corner: true
            pad_all: 0
            border_width: 1
            on_click:
              then:
                - if:
                    condition:
                      lambda: "return !id(alarm_ringing);"
                    then:
                      - script.execute: toggle_alarm_for_today
                - script.execute: reset_idle_timer
            widgets:
              - label:
                  styles: date_style
                  id: alarm_label
                  y: -20
                  text: ""
              - label:
                  id: date_label
                  styles: date_style
                  y: 20
                  text: ""
        - button:
            id: snooze_button
            hidden: true
            width: 88
            height: 88
            x: -66
            y: 0
            align: CENTER
            radius: 44
            bg_color: 0x1E88E5
            text_color: White
            border_width: 0
            on_click:
              then:
                - script.execute: snooze_alarm
                - script.execute: reset_idle_timer
            widgets:
              - label:
                  id: snooze_button_label
                  align: CENTER
                  text_align: center
                  text: "Snooze\n10 min"
        - button:
            id: stop_button
            hidden: true
            width: 88
            height: 88
            x: 66
            y: 0
            align: CENTER
            radius: 44
            bg_color: 0xE53935
            text_color: White
            border_width: 0
            on_click:
              then:
                - script.execute: dismiss_alarm
                - script.execute: reset_idle_timer
            widgets:
              - label:
                  align: CENTER
                  text_align: center
                  text: "Stop"
        - label:
            id: snooze_hint_label
            hidden: true
            align: CENTER
            y: 76
            text_align: center
            text_color: 0xB0BEC5
            text: "Rotate = snooze time"

interval:
  - interval: 25ms
    then:
      - lvgl.indicator.update:
          id: secs_hand
          value: !lambda |-
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (!now.is_valid()) {
              return 0.0f;
            }
            struct timeval tv;
            gettimeofday(&tv, NULL);
            return (now.second * 12) + (tv.tv_usec / 83330.0);

  - interval: 1s
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) {
            now = id(rtctime).now();
          }
          if (!now.is_valid()) {
            return;
          }

          const int minute_key = now.day_of_year * 1440 + now.hour * 60 + now.minute;
          if (id(last_ui_minute_key) != minute_key) {
            id(last_ui_minute_key) = minute_key;
            id(sync_alarm_day_state).execute();
            id(update_minutes_hand).execute();
          }

          if (id(last_alarm_debug_minute_key) != minute_key) {
            id(last_alarm_debug_minute_key) = minute_key;
            auto alarm_time_var = id(alarm_time);
            if (alarm_time_var != nullptr) {
              ESP_LOGI(
                "alarm",
                "Alarm check now=%02d:%02d:%02d target=%02d:%02d enabled=%d disabled_today=%d ringing=%d snooze_active=%d snooze_target=%d/%02d:%02d",
                now.hour,
                now.minute,
                now.second,
                alarm_time_var->hour,
                alarm_time_var->minute,
                id(alarm_enabled),
                id(alarm_disabled_today) && id(alarm_disabled_day) == now.day_of_year,
                id(alarm_ringing),
                id(snooze_active),
                id(snooze_day_of_year),
                id(snooze_hour),
                id(snooze_minute)
              );
            }
          }
      - if:
          condition:
            lambda: |-
              auto now = id(sntp_time).now();
              if (!now.is_valid()) {
                now = id(rtctime).now();
              }
              if (!now.is_valid()) {
                return false;
              }
              if (!id(alarm_enabled) || id(alarm_ringing)) {
                return false;
              }
              auto alarm_time_var = id(alarm_time);
              if (alarm_time_var == nullptr) {
                return false;
              }

              bool alarm_due = false;
              if (id(snooze_active)) {
                alarm_due = id(snooze_day_of_year) == now.day_of_year &&
                            id(snooze_hour) == now.hour &&
                            id(snooze_minute) == now.minute;
              } else {
                if (id(alarm_disabled_today) && id(alarm_disabled_day) == now.day_of_year) {
                  return false;
                }
                alarm_due = now.hour == alarm_time_var->hour && now.minute == alarm_time_var->minute;
              }

              if (!alarm_due) {
                return false;
              }

              const int minute_key = now.day_of_year * 1440 + now.hour * 60 + now.minute;
              if (id(last_alarm_minute_key) == minute_key) {
                return false;
              }
              id(last_alarm_minute_key) = minute_key;
              ESP_LOGI("alarm", "Alarm trigger matched at %02d:%02d:%02d", now.hour, now.minute, now.second);
              return true;
          then:
            - script.execute: start_alarm
      - if:
          condition:
            lambda: |-
              if (id(alarm_ringing)) {
                return false;
              }
              if (id(screen_dimmed)) {
                return false;
              }
              return millis() - id(last_interaction_ms) >= 60000;
          then:
            - lambda: |-
                id(screen_dimmed) = true;
                ESP_LOGD("ui", "Screen dimmed after inactivity");
            - script.execute: apply_idle_brightness

  - interval: 400ms
    then:
      - if:
          condition:
            lambda: "return id(alarm_ringing);"
          then:
            - lambda: |-
                id(alarm_flash_on) = !id(alarm_flash_on);
            - script.execute: update_alarm_status_ui
          else:
            - if:
                condition:
                  lambda: "return id(alarm_flash_on);"
                then:
                  - lambda: |-
                      id(alarm_flash_on) = false;
                  - script.execute: update_alarm_status_ui

script:
  - id: clear_snooze
    then:
      - lambda: |-
          id(snooze_active) = false;
          id(snooze_day_of_year) = -1;
          id(snooze_hour) = -1;
          id(snooze_minute) = -1;

  - id: dismiss_alarm
    then:
      - script.execute: clear_snooze
      - script.execute: stop_alarm

  - id: sync_alarm_day_state
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) {
            now = id(rtctime).now();
          }
          if (!now.is_valid()) {
            return;
          }
          if (id(alarm_disabled_today) && id(alarm_disabled_day) != now.day_of_year) {
            id(alarm_disabled_today) = false;
            id(alarm_disabled_day) = -1;
          }
      - script.execute: update_alarm_status_ui

  - id: toggle_alarm_for_today
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) {
            now = id(rtctime).now();
          }
          if (!now.is_valid()) {
            ESP_LOGW("alarm", "Skip-today toggle requested but current time is invalid");
            return;
          }
          if (id(alarm_disabled_today) && id(alarm_disabled_day) == now.day_of_year) {
            id(alarm_disabled_today) = false;
            id(alarm_disabled_day) = -1;
          } else {
            id(alarm_disabled_today) = true;
            id(alarm_disabled_day) = now.day_of_year;
          }
      - script.execute: update_alarm_status_ui

  - id: apply_active_brightness
    then:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda |-
            if (id(alarm_ringing)) {
              return 1.0f;
            }
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (now.is_valid() && (now.hour >= 23 || now.hour < 7)) {
              return 0.30f;
            }
            return 1.0f;

  - id: apply_idle_brightness
    then:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda |-
            if (id(alarm_ringing)) {
              return 1.0f;
            }
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (now.is_valid() && (now.hour >= 23 || now.hour < 7)) {
              return 0.08f;
            }
            return 0.25f;

  - id: reset_idle_timer
    mode: restart
    then:
      - lambda: |-
          id(last_interaction_ms) = millis();
          const bool was_dimmed = id(screen_dimmed);
          id(screen_dimmed) = false;
          if (was_dimmed) {
            ESP_LOGD("ui", "Screen restored from idle dim");
          }
      - script.execute: apply_active_brightness

  - id: update_alarm_status_ui
    then:
      - lvgl.label.update:
          id: snooze_button_label
          text: !lambda |-
            static char snooze_buf[24];
            snprintf(snooze_buf, sizeof(snooze_buf), "Snooze\n%d min", id(snooze_minutes));
            return snooze_buf;
      - lvgl.label.update:
          id: alarm_label
          text: !lambda |-
            auto alarm_time_var = id(alarm_time);
            static char alarm_buf[24];
            if (alarm_time_var == nullptr) {
              snprintf(alarm_buf, sizeof(alarm_buf), "Alarm --:--");
              return alarm_buf;
            }
            if (!id(alarm_enabled)) {
              snprintf(alarm_buf, sizeof(alarm_buf), "Alarm Off");
            } else if (id(alarm_ringing)) {
              snprintf(alarm_buf, sizeof(alarm_buf), "Alarm!");
            } else if (id(snooze_active)) {
              snprintf(alarm_buf, sizeof(alarm_buf), "Snoozing");
            } else {
              snprintf(alarm_buf, sizeof(alarm_buf), "Alarm %02d:%02d", alarm_time_var->hour, alarm_time_var->minute);
            }
            return alarm_buf;
      - lvgl.label.update:
          id: date_label
          text: !lambda |-
            static const char *const day_names[] = {"Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"};
            static const char *const mon_names[] = {"Jan", "Feb", "Mar", "Apr", "May", "Jun",
                                                    "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"};
            static char date_buf[24];
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }

            if (!id(alarm_enabled)) {
              snprintf(date_buf, sizeof(date_buf), "Disabled");
            } else if (id(snooze_active)) {
              snprintf(date_buf, sizeof(date_buf), "Until %02d:%02d", id(snooze_hour), id(snooze_minute));
            } else if (!now.is_valid() || now.day_of_week < 1 || now.day_of_week > 7 || now.month < 1 || now.month > 12) {
              snprintf(date_buf, sizeof(date_buf), "--");
            } else if (id(alarm_disabled_today) && id(alarm_disabled_day) == now.day_of_year) {
              snprintf(date_buf, sizeof(date_buf), "Skipped Today");
            } else {
              snprintf(date_buf, sizeof(date_buf), "%s, %s %2d", day_names[now.day_of_week - 1], mon_names[now.month - 1], now.day_of_month);
            }
            return date_buf;
      - lvgl.widget.update:
          id: alarm_status_circle
          bg_color: !lambda |-
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (id(alarm_ringing)) {
              return id(alarm_flash_on) ? lv_color_hex(0xFF7043) : lv_color_hex(0xE53935);
            }
            if (id(snooze_active)) {
              return lv_color_hex(0x1E88E5);
            }
            if (!id(alarm_enabled)) {
              return lv_color_hex(0x616161);
            }
            if (now.is_valid() && id(alarm_disabled_today) && id(alarm_disabled_day) == now.day_of_year) {
              return lv_color_hex(0xFFD54F);
            }
            return lv_color_hex(0x000000);
      - if:
          condition:
            lambda: "return id(alarm_ringing);"
          then:
            - if:
                condition:
                  lambda: "return !id(ring_controls_visible);"
                then:
                  - lambda: |-
                      id(ring_controls_visible) = true;
                  - lvgl.widget.hide: [alarm_status_circle]
                  - lvgl.widget.show: [snooze_button, stop_button, snooze_hint_label]
          else:
            - if:
                condition:
                  lambda: "return id(ring_controls_visible);"
                then:
                  - lambda: |-
                      id(ring_controls_visible) = false;
                  - lvgl.widget.show: [alarm_status_circle]
                  - lvgl.widget.hide: [snooze_button, stop_button, snooze_hint_label]

  - id: snooze_alarm
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) {
            now = id(rtctime).now();
          }
          if (!now.is_valid()) {
            ESP_LOGW("alarm", "Snooze requested but current time is invalid");
            return;
          }
          int total_minutes = now.hour * 60 + now.minute + id(snooze_minutes);
          int day_offset = total_minutes / 1440;
          total_minutes %= 1440;
          id(snooze_active) = true;
          id(snooze_day_of_year) = now.day_of_year + day_offset;
          id(snooze_hour) = total_minutes / 60;
          id(snooze_minute) = total_minutes % 60;
          ESP_LOGI("alarm", "Snoozed for %d minutes until day=%d %02d:%02d", id(snooze_minutes), id(snooze_day_of_year), id(snooze_hour), id(snooze_minute));
      - script.execute: stop_alarm
      - script.execute: update_minutes_hand

  - id: snooze_alarm_five_minutes
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) {
            now = id(rtctime).now();
          }
          if (!now.is_valid()) {
            ESP_LOGW("alarm", "5-minute snooze requested but current time is invalid");
            return;
          }
          int total_minutes = now.hour * 60 + now.minute + 5;
          int day_offset = total_minutes / 1440;
          total_minutes %= 1440;
          id(snooze_active) = true;
          id(snooze_day_of_year) = now.day_of_year + day_offset;
          id(snooze_hour) = total_minutes / 60;
          id(snooze_minute) = total_minutes % 60;
          ESP_LOGI("alarm", "Snoozed for 5 minutes until day=%d %02d:%02d", id(snooze_day_of_year), id(snooze_hour), id(snooze_minute));
      - script.execute: stop_alarm
      - script.execute: update_minutes_hand

  - id: start_alarm
    mode: restart
    then:
      - script.execute: clear_snooze
      - lambda: |-
          id(snooze_minutes) = 10;
          id(alarm_ringing) = true;
          auto now = id(sntp_time).now();
          if (!now.is_valid()) {
            now = id(rtctime).now();
          }
          ESP_LOGI("alarm", "Starting alarm at %02d:%02d:%02d", now.hour, now.minute, now.second);
      - script.execute: apply_active_brightness
      - script.execute: update_minutes_hand
      - script.execute: alarm_loop
      - script.execute: alarm_timeout

  - id: stop_alarm
    then:
      - lambda: |-
          if (id(alarm_ringing)) {
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            ESP_LOGI("alarm", "Stopping alarm at %02d:%02d:%02d", now.hour, now.minute, now.second);
          }
          id(alarm_ringing) = false;
      - script.stop: alarm_loop
      - script.stop: alarm_timeout
      - output.turn_off: buzzer
      - script.execute: update_minutes_hand
      - script.execute: reset_idle_timer

  - id: alarm_loop
    mode: restart
    then:
      - while:
          condition:
            lambda: "return id(alarm_ringing);"
          then:
            - output.ledc.set_frequency:
                id: buzzer
                frequency: "3200Hz"
            - output.set_level:
                id: buzzer
                level: 50%
            - delay: 950ms
            - output.turn_off: buzzer
            - delay: 100ms
            - output.ledc.set_frequency:
                id: buzzer
                frequency: "2800Hz"
            - output.set_level:
                id: buzzer
                level: 50%
            - delay: 950ms
            - output.turn_off: buzzer
            - delay: 250ms

  - id: alarm_timeout
    mode: restart
    then:
      - delay: 5min
      - if:
          condition:
            lambda: "return id(alarm_ringing);"
          then:
            - logger.log: "Alarm timed out after 5 minutes"
            - script.execute: stop_alarm

  - id: update_minutes_hand
    then:
      - script.execute: update_alarm_status_ui
      - lvgl.indicator.update:
          id: hour_hand
          value: !lambda |-
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (!now.is_valid()) {
              return 0.0f;
            }
            return std::fmod(now.hour, 12) * 60 + now.minute;
      - lvgl.indicator.update:
          id: minute_hand
          value: !lambda |-
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              now = id(rtctime).now();
            }
            if (!now.is_valid()) {
              return 0.0f;
            }
            return float(now.minute);
